longhorn:
  preUpgradeChecker:
    jobEnabled: false

  httproute:
    enabled: true
    parentRefs: []
    #- name: envoy-gateway-internal
    #  namespace: envoy-gateway-system
    #  sectionName: staging-internal-https
    #  group: gateway.networking.k8s.io
    #  kind: Gateway
    hostnames: []
    #- longhorn.example.com
    annotations: {}

  ingress:
    enabled: false

  serviceMonitor:
    enabled: true

  longhornManager:
    nodeSelector:
      longhorn.store.nodeselect/longhorn-storage-node: "true"

  defaultSettings:
    taintToleration: "nvidia.com/gpu:NoSchedule"
    snapshotMaxCount: "10"
    snapshotDataIntegrity: "enabled"
    snapshotDataIntegrityCronjob: "0 12 * * 1"
    replicaAutoBalance: "best-effort"
    autoDeletePodWhenVolumeDetachedUnexpectedly: true
    allowVolumeCreationWithDegradedAvailability: true
    nodeDrainPolicy: "block-for-eviction"

  persistence:
    defaultClassReplicaCount: 3
    defaultDataLocality: disabled
    migratable: "true"
