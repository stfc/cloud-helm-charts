{{- if .Values.external.enabled }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: external-proxy
  namespace: {{ include "envoy-gateways.namespace" . }}
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        annotations: 
          {{- toYaml  .Values.external.service.annotations | nindent 10}}
        loadBalancerIP: {{.Values.external.service.loadBalancerIP}}
      envoyDeployment:
        replicas: {{ .Values.external.deployment.replicas }}
        container:
          resources:
            requests:
              cpu: {{ .Values.external.deployment.resources.requests.cpu }}
              memory: {{ .Values.external.deployment.resources.requests.memory }}
            limits:
              cpu: {{ .Values.external.deployment.resources.limits.cpu }}
              memory: {{ .Values.external.deployment.resources.limits.memory }}
---
{{- end }}

apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: external
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: external-proxy
    namespace: {{ include "envoy-gateways.namespace" . }}

