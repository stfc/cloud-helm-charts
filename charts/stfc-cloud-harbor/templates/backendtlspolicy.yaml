{{- if .Values.backendTLSPolicy.enabled }}

{{- $services := list "core" "portal" }}
{{- range $svc := $services }}
{{- $cfg := index $.Values.harbor.internalTLS $svc }}
{{- $secret := $cfg.secretName }}
{{- $serviceName := printf "%s-%s" (include "harbor.fullname" $) $svc }}

---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: {{ $serviceName }}-backend-tls-policy
  namespace: {{ $.Release.Namespace }}
spec:
  targetRefs:
  - group: ""
    kind: Service
    name: {{ $serviceName }}

  validation:
    hostname: {{ $serviceName }}.{{ $.Release.Name }}.svc.cluster.local

    caCertificateRefs:
    - group: ""
      kind: ConfigMap
      name: {{ $.Values.backendTLSPolicy.caBundleName }}

{{- end }}
{{- end }}