_meta:
  type: "roles"
  config_version: 2

# Admin role - full cluster access
admin_role:
  reserved: true
  cluster_permissions:
    - "cluster_all"
  index_permissions:
    - index_patterns:
        - "*"
      allowed_actions:
        - "indices_all"
  tenant_permissions:
    - tenant_patterns:
        - "*"
      allowed_actions:
        - "kibana_all_write"

# Cloud staging writer role
writer_staging_role:
  reserved: false
  cluster_permissions:
    - "cluster:monitor/health"
    - "indices:data/write/bulk"
  index_permissions:
    - index_patterns:
        - "kube_logs_staging*"
        - "trivy_staging*"
        - "kube_logs_azimuth-stfc-staging*"
        - "trivy_azimuth-stfc-staging*"
      allowed_actions:
        - "indices:data/write/index"
        - "indices:data/write/update"
        - "indices:admin/mapping/put"
        - "indices:admin/create"
        - "indices:data/write/bulk"
        - "indices:data/write/bulk*"

# Cloud production writer role
writer_prod_role:
  reserved: false
  cluster_permissions:
    - "cluster:monitor/health"
    - "indices:data/write/bulk"
  index_permissions:
    - index_patterns:
        - "kube_logs_prod*"
        - "trivy_prod*"
        - "kube_logs_azimuth-stfc-prod*"
        - "trivy_azimuth-stfc-prod*"
      allowed_actions:
        - "indices:data/write/index"
        - "indices:data/write/update"
        - "indices:admin/mapping/put"
        - "indices:admin/create"
        - "indices:data/write/bulk"
        - "indices:data/write/bulk*"

# Cloud staging reader role
reader_staging_role:
  reserved: false
  cluster_permissions:
    - "cluster:monitor/main"
    - "cluster:monitor/nodes/info"
    - "cluster:monitor/health"
    - "cluster_composite_ops_ro"
  index_permissions:
    - index_patterns:
        - "kube_logs_staging*"
        - "trivy_staging*"
        - "kube_logs_azimuth-stfc-staging*"
        - "trivy_azimuth-stfc-staging*"
        - "kube_logs_azimuth_staging_user_cluster*"
      allowed_actions:
        - "read"
        - "indices_monitor"
  tenant_permissions:
    - tenant_patterns:
        - "cloud-staging"
        - "azimuth-staging"
      allowed_actions:
        - "kibana_all_read"

# Azimuth production writer role
writer_azimuth_user_prod_role:
  reserved: false
  cluster_permissions:
    - "cluster:monitor/health"
    - "indices:data/write/bulk"
  index_permissions:
    - index_patterns:
        - "kube_logs_azimuth_user_cluster*"
      allowed_actions:
        - "indices:data/write/index"
        - "indices:data/write/update"
        - "indices:admin/mapping/put"
        - "indices:admin/create"
        - "indices:data/write/bulk"
        - "indices:data/write/bulk*"

# Azimuth staging writer role
writer_azimuth_user_staging_role:
  reserved: false
  cluster_permissions:
    - "cluster:monitor/health"
    - "indices:data/write/bulk"
  index_permissions:
    - index_patterns:
        - "kube_logs_azimuth_staging_user_cluster*"
      allowed_actions:
        - "indices:data/write/index"
        - "indices:data/write/update"
        - "indices:admin/mapping/put"
        - "indices:admin/create"
        - "indices:data/write/bulk"
        - "indices:data/write/bulk*"
