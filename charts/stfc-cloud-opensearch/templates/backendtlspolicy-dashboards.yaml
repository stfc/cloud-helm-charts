{{- if .Values.backendTLSPolicy.dashboards.enabled -}}
{{- $clusterName := include "opensearch-cluster.cluster-name" (index .Subcharts "opensearch-cluster") -}}
{{- $serviceName := (index .Values "opensearch-cluster").cluster.general.serviceName | default $clusterName }}


apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name:  {{ $serviceName }}-dashboards-backend-tls-policy
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: {{ $serviceName }}-dashboards
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: {{ .Values.backendTLSPolicy.dashboards.caBundleName }}
    hostname: {{ $serviceName }}-dashboards.{{ .Release.Namespace }}.svc.cluster.local

{{- end -}}