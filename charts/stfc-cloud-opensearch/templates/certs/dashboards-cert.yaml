
{{- if .Values.certificate.dashboards.enabled -}}
{{- if not (index .Values "opensearch-cluster" "cluster" "dashboards" "tls" "generate") -}}
{{- $clusterName := index .Values "opensearch-cluster" "cluster" "name" -}}
--- 
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{$clusterName}}-dashboards-certificate
  namespace: {{.Release.Namespace}}
spec:
  subject:
    organizationalUnits: [{{$clusterName}}] # OU
  commonName: {{$clusterName}}-dashboards # CN
  secretName: {{$clusterName}}-dashboards-cert
  duration: 87600h0m0s # 10yr
  renewBefore: 8760h0m0s # 1yr
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  dnsNames:
  - {{$clusterName}}-dashboards
  - {{$clusterName}}-dashboards.{{.Release.Namespace}}
  - {{$clusterName}}-dashboards.{{.Release.Namespace}}.svc
  - {{$clusterName}}-dashboards.{{.Release.Namespace}}.svc.cluster.local
  {{- with .Values.certificate.dashboards.additionalHosts }}
  - {{ . | quote }}
  {{- end }}
  usages:
    - server auth
    - client auth
  issuerRef:
    {{- with .Values.certificate.dashboards.issuer.group }}
    group: {{ . | quote }}
    {{- end }}
    kind: {{ .Values.certificate.dashboards.issuer.kind | quote }}
    name: {{ .Values.certificate.dashboards.issuer.name | quote }}

{{- end }}
{{- end }}