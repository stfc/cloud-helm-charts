{{- if .Values.certificate.http.enabled -}}
{{- if not (index .Values "opensearch-cluster" "cluster" "security" "tls" "http" "generate") -}}
{{- $clusterName := index .Values "opensearch-cluster" "cluster" "name" -}}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{$clusterName}}-http-certificate
  namespace: {{.Release.Namespace}}
spec:
  subject:
    organizationalUnits: [{{$clusterName}}] # OU
  commonName: {{$clusterName}} # CN
  secretName: {{$clusterName}}-http-cert
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  dnsNames:
  - {{$clusterName}}
  - {{$clusterName}}-discovery
  - {{$clusterName}}.{{.Release.Namespace}}
  - {{$clusterName}}.{{.Release.Namespace}}.svc
  - {{$clusterName}}.{{.Release.Namespace}}.svc.cluster.local
  {{- with .Values.certificate.http.additionalHosts }}
  - {{ . | quote }}
  {{- end }}
  usages:
    - server auth
    - client auth
  issuerRef:
    {{- with .Values.certificate.http.issuer.group }}
    group: {{ . | quote }}
    {{- end }}
    kind: {{ .Values.certificate.http.issuer.kind | quote }}
    name: {{ .Values.certificate.http.issuer.name | quote }}

{{- end }}
{{- end }}