{{- if .Values.internalTLS.enabled -}}
{{- $serviceName := printf "%s%s" (include "docker-registry.fullname" .) "-service" -}}

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{template "docker-registry.fullname" .}}-cert
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  secretName: {{ .Values.secretName }}
  duration: 87600h0m0s # 10yr
  renewBefore: 8760h0m0s # 1yr
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  dnsNames:
    - {{$serviceName}}
    - {{$serviceName}}.{{ .Release.Namespace }}.svc
    - {{$serviceName}}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: {{ .Values.caSecret | default "internal-ca"}}}
    kind: Issuer
    group: cert-manager.io
{{- end }}