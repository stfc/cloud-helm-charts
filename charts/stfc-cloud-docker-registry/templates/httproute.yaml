{{- if .Values.httproute.enabled -}}
{{- $serviceName := printf "%s%s" (include "docker-registry.fullname" .) "-service" -}}
{{- $servicePort := .Values.service.port -}}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "docker-registry.fullname" . }}-httproute
  labels:
    app: {{ template "docker-registry.name" . }}
  {{- with .Values.httproute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with .Values.httproute.parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httproute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.httproute.rules }}
    {{- with .matches }}
    - matches:
      {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .filters }}
      filters:
      {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .timeouts }}
      timeouts:
      {{- toYaml . | nindent 8 }}
    {{- end }}
      backendRefs:
        - group: ''
          kind: Service
          name: {{ $serviceName }}
          port: {{ $servicePort }}
          weight: 1
    {{- end }}
    {{- with .Values.httproute.extraRules }}
      {{- tpl (toYaml .) $ | nindent 4 }}
    {{- end }}
---

apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: {{ $serviceName }}-backend-tls-policy
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: {{ $serviceName }}
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: {{ .Values.caBundleName | default "internal-bundle" }}
    hostname: {{ $serviceName }}.{{ .Release.Namespace }}.svc.cluster.local

{{- end }}
